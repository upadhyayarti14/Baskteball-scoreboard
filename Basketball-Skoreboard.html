<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="Scoreboard">


        <!-- Home Team -->
        <div class="team">
            <h3>HOME</h3>
            <div class="score" id="home-score">12</div>

            <div class="buttons">
                <button onclick="addPointsHome1()">+1</button>
                <button onclick="addPointsHome2()">+2</button>
                <button onclick="addPointsHome3()">+3</button>
            </div>
        </div>

        <!-- Guest Team -->
        <div class="team">
            <h3>GUEST</h3>
            <div class="score" id="guest-score">5</div>

            <div class="buttons">
                <button onclick="addPointsGuest1()">+1</button>
                <button onclick="addPointsGuest2()">+2</button>
                <button onclick="addPointsGuest3()">+3</button>
            </div>
        </div>
        

    </div>
    <button class="new-button" onclick="newGame()">New Game button</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
